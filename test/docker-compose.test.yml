services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    environment:
      - LLM_MOCK=true
      - DB_PATH=/app/db/finally.db
    volumes:
      - test-db:/app/db
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; import sys; sys.exit(0 if urlopen('http://localhost:8000/api/health').status == 200 else 1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  playwright:
    image: mcr.microsoft.com/playwright:v1.59.1-jammy
    depends_on:
      app:
        condition: service_healthy
    working_dir: /tests
    volumes:
      - ./:/tests
    command: npx playwright test specs/launch.spec.ts specs/reproducibility.spec.ts
    environment:
      - BASE_URL=http://app:8000
      - NO_PROXY=app,localhost,127.0.0.1
      - no_proxy=app,localhost,127.0.0.1

volumes:
  test-db:
